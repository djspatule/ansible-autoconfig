---
# Keep common package names in one map so the base role stays portable across
# Debian-family and Arch-family hosts without splitting the whole role.
base_packages_by_family:
  Debian:
    cli:
      - curl
      - tmux
      - btop
      - python3-psutil
      - micro
      - fastfetch
      - pdfgrep
      - ncdu
      - mc
      - bat
      - clamav
      - rclone
      - cmatrix
      - eza
      - sl
      - starship
      - stow
      - snapd
      - tree
      - ripgrep
      - rsync
      - sqlite3
      - v4l-utils
      - ffmpeg
      - nethogs
      - fzf
      - fd-find
      - yq
      - lazygit
      - zoxide
    snaps: [] # keep the [] for as long as this list is empty. Delete [] when you at at least one line.
      # - tldr
  Archlinux:
    cli:
      - curl
      - tmux
      - btop
      - python-psutil
      - micro
      - fastfetch
      - pdfgrep
      - ncdu
      - mc
      - bat
      - clamav
      - rclone
      - cmatrix
      - eza
      - sl
      - starship
      - stow
      - tree
      - ripgrep
      - tldr
      - rsync
      - sqlite
      - v4l-utils
      - ffmpeg
      - nethogs
    snaps: []

# NOTE: Opt-in per host. False by default so unknown machines are never touched.
# To enable dotfiles on a new host, add to its host_vars:
#   base_dotfiles_enabled: true
#   dotfiles_stow_packages: [bash, starship, claude, ...]  # override if needed
# For a group of similar hosts, set the default in group_vars/<group> instead.
base_dotfiles_enabled: false
dotfiles_user: "{{ desktop_user | default('lion') }}"
dotfiles_home: "/home/{{ dotfiles_user }}"
dotfiles_source_dir: "{{ playbook_dir }}/files/dotfiles"
# Default package list applied when a host does not override dotfiles_stow_packages.
# claude is intentionally included: it is a CLI tool valid on headless servers too.
dotfiles_stow_packages:
  - bash
  - starship
  - claude
# NOTE: This is the pre-stow backup guard, NOT the package registry.
# Stow will refuse to create a symlink if a real file already exists at the target.
# Every path that any Stow package will own must have an entry here so Ansible can
# preserve the pre-existing file as <path>.pre-stow-backup on the first run.
# Adding a new Stow package: (1) create files/dotfiles/<pkg>/..., (2) add it to
# dotfiles_stow_packages in the relevant host_vars, (3) add its path(s) here.
dotfiles_managed_paths:
  - package: bash
    path: .bashrc
  - package: starship
    path: .config/starship.toml
  - package: tmux
    path: .config/tmux/tmux.conf
  - package: opencode
    path: .config/opencode/opencode.json
  - package: claude
    path: .claude/settings.json
  # ssh ships only the sanitized public config (it just Includes ~/.ssh/config.local).
  # The real host aliases live in the vaulted config.local (see dotfiles_secret_files).
  - package: ssh
    path: .ssh/config
  - package: nvim
    path: .config/nvim
  - package: git
    path: .config/git
  - package: gh
    path: .config/gh/config.yml
  - package: lazygit
    path: .config/lazygit/config.yml
  - package: hypr
    path: .config/hypr
  - package: wireplumber
    path: .config/wireplumber
  - package: systemd
    path: .config/systemd/user/audio-policy.service
  - package: systemd
    path: .config/systemd/user/freebox-mount.service
  - package: scripts
    path: audio_policy.sh
  - package: scripts
    path: freebox.sh
  - package: scripts
    path: rclone_mount.sh
  - package: scripts
    path: serverannah_mount.sh
  - package: scripts
    path: packages.sh

# Secret dotfiles cannot use Stow: a symlink would expose the vault ciphertext to
# the application instead of the real config. They are stored vault-encrypted in
# the repo and copied into place; Ansible decrypts them on the fly when the vault
# password is provided (see the Secrets And Vault section of the README). Each
# entry: src (absolute path to the encrypted file), dest (relative to the user
# home), and optional mode/dir_mode. Empty by default; hosts opt in.
dotfiles_secret_source_dir: "{{ playbook_dir }}/files/dotfiles-secret"
dotfiles_secret_files: []
base_starship_prompt_enabled: true

base_lazydocker_enabled: true
lazydocker_version: 0.25.0
lazydocker_install_dir: /usr/local/bin
lazydocker_install_path: "{{ lazydocker_install_dir }}/lazydocker"
lazydocker_arch_map:
  x86_64: x86_64
  amd64: x86_64
  aarch64: arm64
  arm64: arm64
  armv7l: armv7
  armv6l: armv6

autoconfig_repo_url: https://github.com/djspatule/ansible-autoconfig.git
autoconfig_branch: main
autoconfig_repo_dir: /opt/ansible-pull
autoconfig_playbook: local.yml
autoconfig_timer_name: autoconfig-pull
autoconfig_on_calendar: daily
autoconfig_randomized_delay: 30m
autoconfig_persistent: true
autoconfig_vault_password_file: ""
