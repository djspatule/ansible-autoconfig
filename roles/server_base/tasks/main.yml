---
- name: Ensure the server bootstrap role runs on Debian-family hosts
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == "Debian"
    fail_msg: server_base currently supports Debian-family hosts only.

- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base CLI packages for servers
  ansible.builtin.apt:
    name: "{{ server_cli_packages }}"
    state: present

- name: Ensure snapd is enabled and running
  ansible.builtin.service:
    name: snapd
    state: started
    enabled: true

- name: Check whether CLI snap packages are already installed
  ansible.builtin.command: "snap list {{ item }}"
  loop: "{{ server_snap_packages }}"
  register: server_snap_list
  changed_when: false
  failed_when: false

- name: Install CLI snap packages unavailable in apt
  ansible.builtin.command: "snap install {{ item.item }}"
  loop: "{{ server_snap_list.results }}"
  when: item.rc != 0

- name: Install Docker from distro packages
  ansible.builtin.apt:
    name: "{{ server_docker_packages }}"
    state: present

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
