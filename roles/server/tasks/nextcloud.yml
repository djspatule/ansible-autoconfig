---
- name: Ensure Nextcloud root-managed directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ nextcloud_root_dir }}"

- name: Ensure Nextcloud secret directory exists
  ansible.builtin.file:
    path: "{{ nextcloud_secret_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# Let the containers manage runtime ownership inside their mounted paths.
- name: Ensure Nextcloud runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ nextcloud_app_dir }}"
    - "{{ nextcloud_db_data_dir }}"
    - "{{ nextcloud_data_dir }}"

- name: Install ACL support for Nextcloud external mounts
  ansible.builtin.package:
    name: "{{ nextcloud_acl_packages_by_family[ansible_facts.os_family] }}"
    state: present
  when:
    - nextcloud_external_mounts | default([]) | length > 0
    - ansible_facts.os_family in nextcloud_acl_packages_by_family

- name: Allow Nextcloud to access external mount contents
  ansible.posix.acl:
    path: "{{ item.path }}"
    entity: "{{ nextcloud_external_mount_acl_user }}"
    etype: user
    permissions: rwX
    state: present
    recursive: true
  loop: "{{ nextcloud_external_mounts | default([]) }}"

- name: Allow new external mount contents to inherit Nextcloud access
  ansible.posix.acl:
    path: "{{ item.path }}"
    entity: "{{ nextcloud_external_mount_acl_user }}"
    etype: user
    permissions: rwX
    state: present
    default: true
    recursive: true
  loop: "{{ nextcloud_external_mounts | default([]) }}"

- name: Remove Nextcloud ACL access from protected external paths
  ansible.posix.acl:
    path: "{{ item }}"
    entity: "{{ nextcloud_external_mount_acl_user }}"
    etype: user
    state: absent
    recursive: true
  loop: "{{ nextcloud_external_mount_acl_excludes | default([]) }}"

- name: Remove inherited Nextcloud ACL access from protected external paths
  ansible.posix.acl:
    path: "{{ item }}"
    entity: "{{ nextcloud_external_mount_acl_user }}"
    etype: user
    state: absent
    default: true
    recursive: true
  loop: "{{ nextcloud_external_mount_acl_excludes | default([]) }}"

- name: Restrict protected external paths at their entry point
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0700"
  loop: "{{ nextcloud_external_mount_acl_excludes | default([]) }}"

- name: Build Nextcloud external storage bind mounts
  ansible.builtin.set_fact:
    nextcloud_external_mount_volumes: "{{ nextcloud_external_mounts | default([]) | map(attribute='path') | map('regex_replace', '^(.*)$', '\\1:\\1') | list }}"

- name: Check whether the Nextcloud DB password file exists
  ansible.builtin.stat:
    path: "{{ nextcloud_db_password_file }}"
  register: nextcloud_db_password_file_stat
  no_log: true

- name: Generate the Nextcloud DB password on the target host
  ansible.builtin.shell: "tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32"
  register: nextcloud_db_password_generated
  changed_when: true
  when: not nextcloud_db_password_file_stat.stat.exists
  no_log: true

- name: Save the generated Nextcloud DB password
  ansible.builtin.copy:
    content: "{{ nextcloud_db_password_generated.stdout }}\n"
    dest: "{{ nextcloud_db_password_file }}"
    owner: root
    group: root
    mode: "0600"
  when: not nextcloud_db_password_file_stat.stat.exists
  no_log: true

- name: Check whether the Nextcloud DB root password file exists
  ansible.builtin.stat:
    path: "{{ nextcloud_db_root_password_file }}"
  register: nextcloud_db_root_password_file_stat
  no_log: true

- name: Generate the Nextcloud DB root password on the target host
  ansible.builtin.shell: "tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32"
  register: nextcloud_db_root_password_generated
  changed_when: true
  when: not nextcloud_db_root_password_file_stat.stat.exists
  no_log: true

- name: Save the generated Nextcloud DB root password
  ansible.builtin.copy:
    content: "{{ nextcloud_db_root_password_generated.stdout }}\n"
    dest: "{{ nextcloud_db_root_password_file }}"
    owner: root
    group: root
    mode: "0600"
  when: not nextcloud_db_root_password_file_stat.stat.exists
  no_log: true

- name: Check whether the Nextcloud admin password file exists
  ansible.builtin.stat:
    path: "{{ nextcloud_admin_password_file }}"
  register: nextcloud_admin_password_file_stat
  no_log: true

- name: Generate the Nextcloud admin password on the target host
  ansible.builtin.shell: "tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32"
  register: nextcloud_admin_password_generated
  changed_when: true
  when: not nextcloud_admin_password_file_stat.stat.exists
  no_log: true

- name: Save the generated Nextcloud admin password
  ansible.builtin.copy:
    content: "{{ nextcloud_admin_password_generated.stdout }}\n"
    dest: "{{ nextcloud_admin_password_file }}"
    owner: root
    group: root
    mode: "0600"
  when: not nextcloud_admin_password_file_stat.stat.exists
  no_log: true

- name: Read the managed Nextcloud DB password file
  ansible.builtin.slurp:
    src: "{{ nextcloud_db_password_file }}"
  register: nextcloud_db_password_slurp
  no_log: true

- name: Read the managed Nextcloud DB root password file
  ansible.builtin.slurp:
    src: "{{ nextcloud_db_root_password_file }}"
  register: nextcloud_db_root_password_slurp
  no_log: true

- name: Read the managed Nextcloud admin password file
  ansible.builtin.slurp:
    src: "{{ nextcloud_admin_password_file }}"
  register: nextcloud_admin_password_slurp
  no_log: true

- name: Load the managed Nextcloud secrets
  ansible.builtin.set_fact:
    nextcloud_db_password: "{{ nextcloud_db_password_slurp.content | b64decode | trim }}"
    nextcloud_db_root_password: "{{ nextcloud_db_root_password_slurp.content | b64decode | trim }}"
    nextcloud_admin_password: "{{ nextcloud_admin_password_slurp.content | b64decode | trim }}"
  no_log: true

- name: Ensure the Nextcloud container network exists
  community.docker.docker_network:
    name: "{{ nextcloud_network_name }}"
    state: present

- name: Ensure the Nextcloud Redis data directory exists
  ansible.builtin.file:
    path: "{{ nextcloud_redis_data_dir }}"
    state: directory
  when: nextcloud_redis_enabled

# Small Redis used only as Nextcloud's distributed cache and file lock. It stays
# on the internal service network with no published port, so it is never exposed.
- name: Run the Nextcloud Redis container
  community.docker.docker_container:
    name: "{{ nextcloud_redis_container_name }}"
    image: "{{ nextcloud_redis_image }}"
    state: started
    restart_policy: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - name: "{{ nextcloud_network_name }}"
    volumes:
      - "{{ nextcloud_redis_data_dir }}:/data"
  when: nextcloud_redis_enabled

- name: Pull the Nextcloud application image
  community.docker.docker_image:
    name: "{{ nextcloud_image }}"
    source: pull
    force_source: true
  register: nextcloud_image_pull

- name: Run the Nextcloud database container
  community.docker.docker_container:
    name: "{{ nextcloud_db_container_name }}"
    image: "{{ nextcloud_db_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ nextcloud_network_name }}"
    volumes:
      - "{{ nextcloud_db_data_dir }}:/var/lib/mysql"
    env:
      MYSQL_ROOT_PASSWORD: "{{ nextcloud_db_root_password }}"
      MYSQL_DATABASE: "{{ nextcloud_db_name }}"
      MYSQL_USER: "{{ nextcloud_db_user }}"
      MYSQL_PASSWORD: "{{ nextcloud_db_password }}"
  no_log: true

- name: Wait for the Nextcloud database to become ready
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ nextcloud_db_container_name }}"
      - mariadb
      - -h127.0.0.1
      - -uroot
      - "-p{{ nextcloud_db_root_password }}"
      - -e
      - SELECT 1;
  register: nextcloud_db_ping
  changed_when: false
  retries: "{{ nextcloud_wait_retries }}"
  delay: "{{ nextcloud_wait_delay }}"
  until: nextcloud_db_ping.rc == 0
  no_log: true

# The official image bootstraps the app and data layout for us, while Ansible
# keeps the persistent paths and secret material under control.
- name: Run the Nextcloud application container
  community.docker.docker_container:
    name: "{{ nextcloud_container_name }}"
    image: "{{ nextcloud_image }}"
    state: started
    recreate: "{{ nextcloud_image_pull.changed }}"
    restart_policy: unless-stopped
    published_ports: "{{ nextcloud_published_ports }}"
    networks:
      - name: "{{ nextcloud_network_name }}"
    volumes: "{{ [nextcloud_app_dir ~ ':/var/www/html', nextcloud_data_dir ~ ':/var/www/html/data'] + nextcloud_external_mount_volumes }}"
    env:
      MYSQL_HOST: "{{ nextcloud_db_container_name }}"
      MYSQL_DATABASE: "{{ nextcloud_db_name }}"
      MYSQL_USER: "{{ nextcloud_db_user }}"
      MYSQL_PASSWORD: "{{ nextcloud_db_password }}"
      NEXTCLOUD_ADMIN_USER: "{{ nextcloud_admin_user }}"
      NEXTCLOUD_ADMIN_PASSWORD: "{{ nextcloud_admin_password }}"
      NEXTCLOUD_TRUSTED_DOMAINS: "{{ nextcloud_trusted_domains | join(' ') }}"
  no_log: true

- name: Wait for Nextcloud config.php to be created
  ansible.builtin.stat:
    path: "{{ nextcloud_app_dir }}/config/config.php"
  register: nextcloud_config_stat
  retries: "{{ nextcloud_wait_retries }}"
  delay: 2
  until: nextcloud_config_stat.stat.exists

# The container writes config.php before the installer fully finishes. Wait for
# Nextcloud to report itself as installed before calling broader occ commands.
- name: Wait for Nextcloud to report itself as installed
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - status
      - --output=json
  register: nextcloud_occ_status
  changed_when: false
  retries: "{{ nextcloud_wait_retries }}"
  delay: 2
  until: nextcloud_occ_status.stdout is search('"installed":true')

# Keep the reverse-proxy-specific system config idempotent with occ instead of
# editing PHP arrays by hand.
- name: Set Nextcloud trusted domains
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - trusted_domains
      - "{{ index | string }}"
      - --value={{ item }}
  loop: "{{ nextcloud_trusted_domains }}"
  loop_control:
    index_var: index
  changed_when: false

- name: Set Nextcloud trusted proxies
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - trusted_proxies
      - "{{ index | string }}"
      - --value={{ item }}
  loop: "{{ nextcloud_trusted_proxies }}"
  loop_control:
    index_var: index
  changed_when: false

- name: Set Nextcloud forwarded-for headers
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - forwarded_for_headers
      - "{{ index | string }}"
      - --value={{ item }}
  loop: "{{ nextcloud_forwarded_for_headers }}"
  loop_control:
    index_var: index
  changed_when: false

- name: Set Nextcloud overwrite host
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - overwritehost
      - --value={{ nextcloud_public_url | regex_replace('^https?://', '') }}
  changed_when: false

- name: Set Nextcloud overwrite protocol
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - overwriteprotocol
      - --value={{ nextcloud_public_url | regex_search('^https?') }}
  changed_when: false

- name: Set Nextcloud overwrite CLI URL
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - overwrite.cli.url
      - --value={{ nextcloud_public_url }}
  changed_when: false

# --- Redis cache + transactional file locking ---------------------------------
- name: Configure the Nextcloud Redis connection
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - redis
      - "{{ item.key }}"
      - "--value={{ item.value }}"
      - "--type={{ item.type }}"
  loop:
    - {key: host, value: "{{ nextcloud_redis_container_name }}", type: string}
    - {key: port, value: "{{ nextcloud_redis_port }}", type: integer}
  loop_control:
    label: "redis.{{ item.key }}"
  changed_when: false
  when: nextcloud_redis_enabled

- name: Configure Nextcloud memory caches
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - "{{ item.key }}"
      - "--value={{ item.value }}"
  loop:
    - {key: memcache.local, value: \OC\Memcache\APCu}
    - {key: memcache.distributed, value: \OC\Memcache\Redis}
    - {key: memcache.locking, value: \OC\Memcache\Redis}
  loop_control:
    label: "{{ item.key }}"
  changed_when: false
  when: nextcloud_redis_enabled

# --- Small setup-warning fixes -------------------------------------------------
- name: Set Nextcloud default phone region
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - default_phone_region
      - "--value={{ nextcloud_default_phone_region }}"
  changed_when: false
  when: nextcloud_default_phone_region | length > 0

- name: Set Nextcloud maintenance window start hour
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - maintenance_window_start
      - "--value={{ nextcloud_maintenance_window_start }}"
      - --type=integer
  changed_when: false
  when: nextcloud_maintenance_window_start | string | length > 0

# The Freebox rewrites LAN clients' source address to its own when they reach the
# server through the public hostname (NAT hairpinning), so Nextcloud throttles the
# whole house as one IP. Allowlisting the LAN exempts trusted local clients.
- name: Set Nextcloud brute-force protection allowlist
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - bruteforce.protection.allowlist
      - "{{ index | string }}"
      - "--value={{ item }}"
  loop: "{{ nextcloud_bruteforce_allowlist }}"
  loop_control:
    index_var: index
  changed_when: false

# --- Outgoing email (SMTP) -----------------------------------------------------
- name: Check whether the Nextcloud SMTP password file exists
  ansible.builtin.stat:
    path: "{{ nextcloud_smtp_password_file }}"
  register: nextcloud_smtp_password_file_stat
  when: nextcloud_smtp_enabled
  no_log: true

- name: Warn when SMTP is enabled but the password file is missing
  ansible.builtin.debug:
    msg: >-
      SMTP is enabled but {{ nextcloud_smtp_password_file }} is missing on the
      host, so outgoing mail was left unconfigured. Create that file (mode 0600)
      containing your SMTP app password, then re-run autoconfig-pull.
  when:
    - nextcloud_smtp_enabled
    - not nextcloud_smtp_password_file_stat.stat.exists

- name: Read the Nextcloud SMTP password
  ansible.builtin.slurp:
    src: "{{ nextcloud_smtp_password_file }}"
  register: nextcloud_smtp_password_slurp
  when:
    - nextcloud_smtp_enabled
    - nextcloud_smtp_password_file_stat.stat.exists
  no_log: true

- name: Configure Nextcloud outgoing mail
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - "{{ item.key }}"
      - "--value={{ item.value }}"
      - "--type={{ item.type | default('string') }}"
  loop:
    - {key: mail_smtpmode, value: smtp}
    - {key: mail_sendmailmode, value: smtp}
    - {key: mail_smtphost, value: "{{ nextcloud_smtp_host }}"}
    - {key: mail_smtpport, value: "{{ nextcloud_smtp_port }}", type: integer}
    - {key: mail_smtpsecure, value: "{{ nextcloud_smtp_secure }}"}
    - {key: mail_smtpauth, value: "{{ nextcloud_smtp_auth | ternary('true', 'false') }}", type: boolean}
    - {key: mail_smtpname, value: "{{ nextcloud_smtp_name }}"}
    - {key: mail_from_address, value: "{{ nextcloud_smtp_from_address }}"}
    - {key: mail_domain, value: "{{ nextcloud_smtp_from_domain }}"}
  loop_control:
    label: "{{ item.key }}"
  changed_when: false
  when:
    - nextcloud_smtp_enabled
    - nextcloud_smtp_password_file_stat.stat.exists
  no_log: true

- name: Configure the Nextcloud SMTP password
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - config:system:set
      - mail_smtppassword
      - "--value={{ nextcloud_smtp_password_slurp.content | b64decode | trim }}"
  changed_when: false
  when:
    - nextcloud_smtp_enabled
    - nextcloud_smtp_password_file_stat.stat.exists
  no_log: true

- name: Query the current Nextcloud app list
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - app:list
      - --output=json
  register: nextcloud_app_list
  changed_when: false

- name: Parse the current Nextcloud app list
  ansible.builtin.set_fact:
    nextcloud_app_list_parsed: "{{ nextcloud_app_list.stdout | from_json }}"

- name: Ensure the Nextcloud external storage app is enabled
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - app:enable
      - files_external
  when: nextcloud_app_list_parsed.enabled.files_external is not defined

- name: Check whether managed Nextcloud user password files exist
  ansible.builtin.stat:
    path: "{{ item.password_file }}"
  loop: "{{ nextcloud_managed_users }}"
  register: nextcloud_managed_user_password_file_stats
  no_log: true

- name: Generate missing managed Nextcloud user passwords on the target host
  ansible.builtin.shell: |
    set -eu
    umask 077
    tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32 > "{{ item.item.password_file }}"
  args:
    executable: /bin/bash
    creates: "{{ item.item.password_file }}"
  loop: "{{ nextcloud_managed_user_password_file_stats.results }}"
  when: not item.stat.exists
  no_log: true

- name: Read managed Nextcloud user password files
  ansible.builtin.slurp:
    src: "{{ item.password_file }}"
  loop: "{{ nextcloud_managed_users }}"
  register: nextcloud_managed_user_password_slurps
  no_log: true

- name: Build the managed Nextcloud user password map
  ansible.builtin.set_fact:
    nextcloud_user_password_map: "{{ nextcloud_user_password_map | default({}) | combine({item.item.uid: item.content | b64decode | trim}) }}"
  loop: "{{ nextcloud_managed_user_password_slurps.results }}"
  no_log: true

- name: Check whether managed Nextcloud users already exist
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - user:info
      - "{{ item.uid }}"
  loop: "{{ nextcloud_managed_users }}"
  register: nextcloud_user_info
  changed_when: false
  failed_when: false

- name: Create missing managed Nextcloud users
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - -e
      - "OC_PASS={{ nextcloud_user_password_map[item.item.uid] }}"
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - user:add
      - --password-from-env
      - --display-name={{ item.item.display_name | default(item.item.uid) }}
      - "{{ item.item.uid }}"
  loop: "{{ nextcloud_user_info.results }}"
  when: item.rc != 0
  no_log: true

# Keep managed account recovery simple during migration: the password files in
# /etc/ansible/secrets are the source of truth even if the account already
# existed with an unknown password from an older Nextcloud install.
- name: Ensure managed Nextcloud users use their managed passwords
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - -e
      - "OC_PASS={{ nextcloud_user_password_map[item.uid] }}"
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - user:resetpassword
      - --password-from-env
      - "{{ item.uid }}"
  loop: "{{ nextcloud_managed_users }}"
  changed_when: false
  no_log: true

- name: List current Nextcloud external mounts
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - files_external:list
      - --output=json
  register: nextcloud_external_mounts_list
  changed_when: false

- name: Parse current Nextcloud external mounts
  ansible.builtin.set_fact:
    nextcloud_external_mounts_current: "{{ nextcloud_external_mounts_list.stdout | default('[]') | from_json }}"

- name: Create missing Nextcloud external mounts
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - files_external:create
      - "{{ item.mount_point }}"
      - local
      - null::null
      - --config=datadir={{ item.path }}
  loop: "{{ nextcloud_external_mounts }}"
  when: (nextcloud_external_mounts_current | selectattr('mount_point', 'equalto', item.mount_point) | list | length) == 0

- name: Refresh Nextcloud external mounts after creation
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -u
      - www-data
      - "{{ nextcloud_container_name }}"
      - php
      - occ
      - files_external:list
      - --output=json
  register: nextcloud_external_mounts_list_refreshed
  changed_when: false

- name: Parse refreshed Nextcloud external mounts
  ansible.builtin.set_fact:
    nextcloud_external_mounts_current: "{{ nextcloud_external_mounts_list_refreshed.stdout | default('[]') | from_json }}"

- name: Ensure Nextcloud external mount is applicable to expected users
  ansible.builtin.command:
    argv: "{{ ['docker', 'exec', '-u', 'www-data', nextcloud_container_name, 'php', 'occ', 'files_external:applicable', ((nextcloud_external_mounts_current | selectattr('mount_point', 'equalto', item.0.mount_point) | map(attribute='mount_id') | first) | string)] + ['--add-user=' ~ item.1] }}"
  loop: "{{ nextcloud_external_mounts | subelements('users') }}"
  changed_when: false
