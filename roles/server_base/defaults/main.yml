---
# Start with the CLI portion of roles/base/tasks/packages.yml and keep this
# server list free of desktop-only packages.
# Map package names by OS family so the server role stays portable without
# cloning the whole role into distro-specific copies.
server_packages_by_family:
  Debian:
    cli:
      - curl
      - btop
      - python3-psutil
      - micro
      - fastfetch
      - pdfgrep
      - ncdu
      - mc
      - bat
      - clamav
      - rclone
      - cmatrix
      - eza
      - sl
      - snapd
      - tree
      - ripgrep
    docker:
      - docker.io
      - python3-docker
    snaps:
      - tldr
  Archlinux:
    cli:
      - curl
      - btop
      - python-psutil
      - micro
      - fastfetch
      - pdfgrep
      - ncdu
      - mc
      - bat
      - clamav
      - rclone
      - cmatrix
      - eza
      - sl
      - tree
      - ripgrep
      - tldr
    docker:
      - docker
      - python-docker
    snaps: []
