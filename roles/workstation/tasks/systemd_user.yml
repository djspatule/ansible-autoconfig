---
- name: Reload systemd user daemon after service files are deployed
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ workstation_user }}"

- name: Enable and start workstation user services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    scope: user
  become: true
  become_user: "{{ workstation_user }}"
  loop: "{{ workstation_systemd_user_services }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ (lookup('pipe', 'id -u ' ~ workstation_user)) }}"
