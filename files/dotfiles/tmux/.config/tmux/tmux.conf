set -g status on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

run '~/.config/tmux/plugins/tpm/tpm'

# Omarchy-style pane borders, loaded after TPM so plugins cannot override them.
# Previous tmux default: set -g pane-border-lines single
set -g pane-border-lines heavy

# Keep Omarchy's muted inactive border color.
# Previous Omarchy style: set -g pane-border-style "fg=brightblack"
set -g pane-border-style "fg=brightblack"

# Use Omarchy's blue accent as a full border cell background for stronger active-pane contrast.
# Previous Omarchy style: set -g pane-active-border-style "fg=blue"
# Previous attempt: set -g pane-active-border-style "fg=blue,bold"
set -g pane-active-border-style "fg=black,bg=blue,bold"
