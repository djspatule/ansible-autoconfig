---
# Nextcloud stores app state and internal data under nextcloud_root_dir. Resolve
# the backing filesystem with findmnt --target so paths on / are valid too.
- name: Derive the required Nextcloud storage mount point
  ansible.builtin.set_fact:
    nextcloud_required_mount_point: "{{ nextcloud_root_dir | dirname }}"

- name: Check whether the required Nextcloud storage mount is active
  ansible.builtin.command:
    argv:
      - findmnt
      - --target
      - "{{ nextcloud_required_mount_point }}"
  register: nextcloud_required_mount_check
  changed_when: false
  failed_when: false

- name: Remember whether Nextcloud can safely run on this host
  ansible.builtin.set_fact:
    nextcloud_storage_mount_available: "{{ nextcloud_required_mount_check.rc == 0 }}"

- name: Explain why Nextcloud is skipped when storage is not mounted
  ansible.builtin.debug:
    msg: >-
      Nextcloud is enabled, but {{ nextcloud_required_mount_point }} is not an
      available filesystem target. Skipping Nextcloud so its data is not written
      somewhere unexpected.
  when: not nextcloud_storage_mount_available
