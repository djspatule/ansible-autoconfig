---
- hosts: all
  tags: always
  become: true
  pre_tasks:
    - name: update repositories (arch)
      tags: always
      become: true
      community.general.pacman:
        update_cache: true
      changed_when: false
      when: ansible_facts['distribution'] == 'Archlinux'

    - name: update repositories and apply distribution upgrades
      tags: always
      become: true
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      # No changed_when override here: a dist upgrade is a real system change, so
      # let Ansible report "changed" honestly when packages were actually upgraded.
      when: ansible_facts['distribution'] in ["Debian", "Pop!_OS", "Ubuntu"]

# run roles
- hosts: all
  tags: base
  become: true
  roles:
    - base

- hosts: server
  tags: server
  become: true
  roles:
    # The server role now contains only server-specific storage and services.
    - server

- hosts: workstation
  tags: workstation
  become: true
  roles:
    - workstation

# end of run cleanup
- hosts: all
  become: true
  tasks:
    - name: cleanup package cache (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoclean: true
      changed_when: false
      when: ansible_facts['distribution'] in ["Debian", "Pop!_OS", "Ubuntu"]

    - name: autoremove orphan packages (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoremove: true
        purge: true
      when: ansible_facts['distribution'] in ["Debian", "Pop!_OS", "Ubuntu"]
