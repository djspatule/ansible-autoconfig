---
- name: Ensure AuMenuIlYA backup tree is available
  ansible.builtin.assert:
    that:
      - aumenuilya_backup_root | length > 0
    fail_msg: Define aumenuilya_backup_root for hosts that restore the site.

- name: Check AuMenuIlYA source tree
  ansible.builtin.stat:
    path: "{{ aumenuilya_source_tree }}"
  register: aumenuilya_source_tree_stat

- name: Check AuMenuIlYA wp-content tree
  ansible.builtin.stat:
    path: "{{ aumenuilya_source_wp_content }}"
  register: aumenuilya_source_wp_content_stat

- name: Check AuMenuIlYA SQL dump
  ansible.builtin.stat:
    path: "{{ aumenuilya_source_sql_dump }}"
    checksum_algorithm: sha256
  register: aumenuilya_sql_dump_stat

- name: Fail when AuMenuIlYA backup files are missing
  ansible.builtin.assert:
    that:
      - aumenuilya_source_tree_stat.stat.exists
      - aumenuilya_source_wp_content_stat.stat.exists
      - aumenuilya_sql_dump_stat.stat.exists
    fail_msg: AuMenuIlYA backup source files are missing on this host.

- name: Ensure AuMenuIlYA root-managed directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ aumenuilya_root_dir }}"
    - "{{ aumenuilya_import_dir }}"

- name: Ensure AuMenuIlYA secret directory exists
  ansible.builtin.file:
    path: "{{ aumenuilya_secret_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# Let the containers own their runtime data. Enforcing root ownership here makes
# the next Ansible run fight with normal WordPress and MariaDB behavior.
- name: Ensure AuMenuIlYA runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ aumenuilya_app_dir }}"
    - "{{ aumenuilya_app_dir }}/wp-content"
    - "{{ aumenuilya_db_data_dir }}"

- name: Load AuMenuIlYA database passwords
  ansible.builtin.set_fact:
    aumenuilya_db_password: >-
      {{ lookup('ansible.builtin.password', aumenuilya_db_password_file + ' length=32 chars=ascii_letters,digits') }}
    aumenuilya_db_root_password: >-
      {{ lookup('ansible.builtin.password', aumenuilya_db_root_password_file + ' length=32 chars=ascii_letters,digits') }}
  no_log: true

- name: Ensure AuMenuIlYA container network exists
  community.docker.docker_network:
    name: "{{ aumenuilya_network_name }}"
    state: present

- name: Copy AuMenuIlYA SQL dump into managed import directory
  ansible.builtin.copy:
    src: "{{ aumenuilya_source_sql_dump }}"
    dest: "{{ aumenuilya_import_dir }}/site.sql"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

# Rsync is used here on purpose because the uploads tree is large. For this kind
# of host-local backup restore, rsync is clearer and cheaper than a recursive
# Ansible copy of a multi-gigabyte media directory.
- name: Sync AuMenuIlYA wp-content from backup
  ansible.builtin.command:
    argv:
      - rsync
      - -rltD
      - --delete
      - --itemize-changes
      - --no-owner
      - --no-group
      - "{{ aumenuilya_source_wp_content }}"
      - "{{ aumenuilya_app_dir }}/wp-content/"
  register: aumenuilya_rsync_wp_content
  changed_when: aumenuilya_rsync_wp_content.stdout | trim != ""

- name: Check whether AuMenuIlYA .htaccess exists in backup
  ansible.builtin.stat:
    path: "{{ aumenuilya_source_htaccess }}"
  register: aumenuilya_htaccess_stat

- name: Restore AuMenuIlYA .htaccess
  ansible.builtin.copy:
    src: "{{ aumenuilya_source_htaccess }}"
    dest: "{{ aumenuilya_app_dir }}/.htaccess"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when: aumenuilya_htaccess_stat.stat.exists

- name: Remove stale AuMenuIlYA .htaccess when backup has none
  ansible.builtin.file:
    path: "{{ aumenuilya_app_dir }}/.htaccess"
    state: absent
  when: not aumenuilya_htaccess_stat.stat.exists

- name: Check whether AuMenuIlYA ads.txt exists in backup
  ansible.builtin.stat:
    path: "{{ aumenuilya_source_ads_txt }}"
  register: aumenuilya_ads_txt_stat

- name: Restore AuMenuIlYA ads.txt
  ansible.builtin.copy:
    src: "{{ aumenuilya_source_ads_txt }}"
    dest: "{{ aumenuilya_app_dir }}/ads.txt"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when: aumenuilya_ads_txt_stat.stat.exists

- name: Remove stale AuMenuIlYA ads.txt when backup has none
  ansible.builtin.file:
    path: "{{ aumenuilya_app_dir }}/ads.txt"
    state: absent
  when: not aumenuilya_ads_txt_stat.stat.exists

- name: Run AuMenuIlYA database container
  community.docker.docker_container:
    name: "{{ aumenuilya_db_container_name }}"
    image: "{{ aumenuilya_db_image }}"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: "{{ aumenuilya_network_name }}"
    volumes:
      - "{{ aumenuilya_db_data_dir }}:/var/lib/mysql"
      - "{{ aumenuilya_import_dir }}:/import:ro"
    env:
      MARIADB_DATABASE: "{{ aumenuilya_db_name }}"
      MARIADB_USER: "{{ aumenuilya_db_user }}"
      MARIADB_PASSWORD: "{{ aumenuilya_db_password }}"
      MARIADB_ROOT_PASSWORD: "{{ aumenuilya_db_root_password }}"
  no_log: true

- name: Wait for AuMenuIlYA database to become ready
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ aumenuilya_db_container_name }}"
      - mariadb
      - -h127.0.0.1
      - -uroot
      - "-p{{ aumenuilya_db_root_password }}"
      - -e
      - SELECT 1;
  register: aumenuilya_db_ping
  changed_when: false
  retries: "{{ aumenuilya_wait_retries }}"
  delay: "{{ aumenuilya_wait_delay }}"
  until: aumenuilya_db_ping.rc == 0
  no_log: true

- name: Check whether AuMenuIlYA database already has the wp_options table
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ aumenuilya_db_container_name }}"
      - mariadb
      - -h127.0.0.1
      - -uroot
      - "-p{{ aumenuilya_db_root_password }}"
      - -N
      - -e
      - >-
        SELECT COUNT(*) FROM information_schema.tables
        WHERE table_schema = '{{ aumenuilya_db_name }}'
        AND table_name = '{{ aumenuilya_table_prefix }}options';
  register: aumenuilya_db_seed_state
  changed_when: false
  no_log: true

# Use the database itself as the source of truth here. File markers can lie if
# the database volume is replaced while the import directory survives.
- name: Import AuMenuIlYA database dump
  ansible.builtin.shell: >-
    docker exec -i {{ aumenuilya_db_container_name }} mariadb
    -h127.0.0.1 -uroot -p{{ aumenuilya_db_root_password }} < {{ aumenuilya_import_dir }}/site.sql
  args:
    executable: /bin/bash
  when: aumenuilya_db_seed_state.stdout | trim != "1"
  no_log: true

# The official WordPress image bootstraps core files and wp-config.php, while
# the restored wp-content keeps the site's theme, plugins, and uploads.
- name: Run AuMenuIlYA WordPress container
  community.docker.docker_container:
    name: "{{ aumenuilya_app_container_name }}"
    image: "{{ aumenuilya_wordpress_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports: "{{ aumenuilya_published_ports }}"
    networks:
      - name: "{{ aumenuilya_network_name }}"
    volumes:
      - "{{ aumenuilya_app_dir }}:/var/www/html"
    env:
      WORDPRESS_DB_HOST: "{{ aumenuilya_db_container_name }}:3306"
      WORDPRESS_DB_USER: "{{ aumenuilya_db_user }}"
      WORDPRESS_DB_PASSWORD: "{{ aumenuilya_db_password }}"
      WORDPRESS_DB_NAME: "{{ aumenuilya_db_name }}"
      WORDPRESS_TABLE_PREFIX: "{{ aumenuilya_table_prefix }}"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '{{ aumenuilya_public_url }}');
        define('WP_SITEURL', '{{ aumenuilya_public_url }}');
        if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $_SERVER['HTTPS'] = 'on';
        }
        if (isset($_SERVER['HTTP_X_FORWARDED_HOST'])) {
          $_SERVER['HTTP_HOST'] = $_SERVER['HTTP_X_FORWARDED_HOST'];
        }
  no_log: true

- name: Wait for generated AuMenuIlYA wp-config.php
  ansible.builtin.stat:
    path: "{{ aumenuilya_app_dir }}/wp-config.php"
  register: aumenuilya_wp_config_stat
  retries: "{{ aumenuilya_wait_retries }}"
  delay: 2
  until: aumenuilya_wp_config_stat.stat.exists

- name: Check whether AuMenuIlYA URL replacement already ran
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ aumenuilya_db_container_name }}"
      - mariadb
      - -h127.0.0.1
      - -uroot
      - "-p{{ aumenuilya_db_root_password }}"
      - -N
      - -e
      - >-
        SELECT option_value FROM {{ aumenuilya_db_name }}.{{ aumenuilya_table_prefix }}options
        WHERE option_name = 'home' LIMIT 1;
  register: aumenuilya_home_option
  changed_when: false
  no_log: true

# WP-CLI is used for the URL rewrite because WordPress stores URLs in serialized
# data; a plain SQL replace would eventually corrupt some values. Theme and
# plugin code is skipped here because old site code can break maintenance CLI
# runs even when the database operation itself is valid.
- name: Rewrite AuMenuIlYA URLs to the current public address
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - --network
      - "{{ aumenuilya_network_name }}"
      - -v
      - "{{ aumenuilya_app_dir }}:/var/www/html"
      - -e
      - "WORDPRESS_DB_HOST={{ aumenuilya_db_container_name }}:3306"
      - -e
      - "WORDPRESS_DB_USER={{ aumenuilya_db_user }}"
      - -e
      - "WORDPRESS_DB_PASSWORD={{ aumenuilya_db_password }}"
      - -e
      - "WORDPRESS_DB_NAME={{ aumenuilya_db_name }}"
      - "{{ aumenuilya_wpcli_image }}"
      - wp
      - search-replace
      - "{{ aumenuilya_old_url }}"
      - "{{ aumenuilya_public_url }}"
      - --allow-root
      - --path=/var/www/html
      - --skip-columns=guid
      - --skip-themes
      - --skip-plugins
      - --all-tables
  when: aumenuilya_home_option.stdout | trim != aumenuilya_public_url
  no_log: true
