---
- block:
  # Base is now the common foundation for every host, closer to the
  # LearnLinuxTV layout. Only server-safe tasks belong here.
  - import_tasks: common_packages.yml
  - import_tasks: dotfiles.yml
    when: base_dotfiles_enabled | default(false)
  - import_tasks: autopull.yml
  rescue:
    - set_fact: task_failed=true
