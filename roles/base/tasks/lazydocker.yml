---
- name: Ensure lazydocker runs on supported CPU architectures
  ansible.builtin.assert:
    that:
      - ansible_facts.architecture in lazydocker_arch_map
    fail_msg: >-
      lazydocker currently supports only these architectures:
      {{ lazydocker_arch_map.keys() | join(', ') }}.

- name: Check the currently installed lazydocker version
  ansible.builtin.command:
    argv:
      - lazydocker
      - --version
  register: lazydocker_version_check
  changed_when: false
  failed_when: false

- name: Ensure the lazydocker install directory exists
  ansible.builtin.file:
    path: "{{ lazydocker_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download lazydocker release archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/jesseduffield/lazydocker/releases/download/v{{ lazydocker_version }}/lazydocker_{{ lazydocker_version }}_Linux_{{ lazydocker_arch_map[ansible_facts.architecture] }}.tar.gz
    dest: "/tmp/lazydocker_{{ lazydocker_version }}_{{ lazydocker_arch_map[ansible_facts.architecture] }}.tar.gz"
    mode: "0644"
  when: lazydocker_version_check.rc != 0 or (lazydocker_version not in lazydocker_version_check.stdout)

- name: Remove the previous lazydocker extraction directory
  ansible.builtin.file:
    path: /tmp/lazydocker-install
    state: absent
  when: lazydocker_version_check.rc != 0 or (lazydocker_version not in lazydocker_version_check.stdout)

- name: Ensure the lazydocker extraction directory exists
  ansible.builtin.file:
    path: /tmp/lazydocker-install
    state: directory
    mode: "0755"
  when: lazydocker_version_check.rc != 0 or (lazydocker_version not in lazydocker_version_check.stdout)

- name: Extract lazydocker release archive
  ansible.builtin.unarchive:
    src: "/tmp/lazydocker_{{ lazydocker_version }}_{{ lazydocker_arch_map[ansible_facts.architecture] }}.tar.gz"
    dest: /tmp/lazydocker-install
    remote_src: true
  when: lazydocker_version_check.rc != 0 or (lazydocker_version not in lazydocker_version_check.stdout)

- name: Install lazydocker binary
  ansible.builtin.copy:
    src: /tmp/lazydocker-install/lazydocker
    dest: "{{ lazydocker_install_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: lazydocker_version_check.rc != 0 or (lazydocker_version not in lazydocker_version_check.stdout)
