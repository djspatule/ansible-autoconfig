---
- name: Ensure Homepage root directory exists
  ansible.builtin.file:
    path: "{{ homepage_root_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Homepage config tree
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/homepage/opt/homepage/"
    dest: "{{ homepage_root_dir }}/"
    owner: root
    group: root
    mode: preserve
    directory_mode: "0755"

- name: Pull Homepage image
  community.docker.docker_image:
    name: "{{ homepage_image }}"
    source: pull

- name: Run Homepage container
  community.docker.docker_container:
    name: "{{ homepage_container_name }}"
    image: "{{ homepage_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports:
      - "{{ homepage_port }}:3000"
    volumes:
      - "{{ homepage_config_dir }}:/app/config"
      - /var/run/docker.sock:/var/run/docker.sock
    env:
      HOMEPAGE_ALLOWED_HOSTS: "{{ homepage_allowed_hosts | unique | join(',') }}"
