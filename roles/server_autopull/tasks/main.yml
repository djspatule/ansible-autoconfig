---
# Keep the recurring pull logic in its own role so the base server setup can be
# reused even on machines that should not self-update yet.
- name: Install autoconfig pull helper script
  ansible.builtin.template:
    src: autoconfig-pull.sh.j2
    dest: /usr/local/bin/autoconfig-pull
    owner: root
    group: root
    mode: "0755"

- name: Install autoconfig systemd service
  ansible.builtin.template:
    src: autoconfig-pull.service.j2
    dest: "/etc/systemd/system/{{ autoconfig_timer_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install autoconfig systemd timer
  ansible.builtin.template:
    src: autoconfig-pull.timer.j2
    dest: "/etc/systemd/system/{{ autoconfig_timer_name }}.timer"
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Ensure autoconfig timer is enabled and running
  ansible.builtin.systemd_service:
    name: "{{ autoconfig_timer_name }}.timer"
    state: started
    enabled: true
