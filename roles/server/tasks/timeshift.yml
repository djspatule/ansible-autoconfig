---
- name: Ensure Timeshift mount point exists
  ansible.builtin.file:
    path: "{{ timeshift_mount_point }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Timeshift
  ansible.builtin.apt:
    name: timeshift
    state: present
    update_cache: false

- name: Ensure Timeshift config directory exists
  ansible.builtin.file:
    path: /etc/timeshift
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Timeshift configuration
  ansible.builtin.copy:
    dest: /etc/timeshift/timeshift.json
    owner: root
    group: root
    mode: "0600"
    content: |
      {
        "backup_device_uuid": "{{ timeshift_device_uuid }}",
        "parent_device_uuid": "",
        "do_first_run": "false",
        "btrfs_mode": "false",
        "include_btrfs_home_for_backup": "false",
        "include_btrfs_home_for_restore": "false",
        "stop_cron_on_battery": "false",
        "schedule_monthly": "{{ 'true' if 'monthly' in timeshift_schedule else 'false' }}",
        "schedule_weekly": "{{ 'true' if 'weekly' in timeshift_schedule else 'false' }}",
        "schedule_daily": "{{ 'true' if 'daily' in timeshift_schedule else 'false' }}",
        "schedule_hourly": "false",
        "schedule_boot": "false",
        "count_monthly": "{{ timeshift_keep_monthly }}",
        "count_weekly": "{{ timeshift_keep_weekly }}",
        "count_daily": "{{ timeshift_keep_daily }}",
        "count_hourly": "0",
        "count_boot": "0",
        "snapshot_size": "",
        "snapshot_count": "",
        "date_format": "%Y-%m-%d %H:%M:%S",
        "exclude": [],
        "exclude-apps": []
      }
  register: timeshift_config

- name: Enable and start Timeshift cron service
  ansible.builtin.systemd:
    name: cron
    enabled: true
    state: started

- name: Take an initial snapshot if config was just written
  ansible.builtin.command:
    cmd: timeshift --create --comments "ansible initial snapshot" --scripted
  when: timeshift_config.changed
  changed_when: true
