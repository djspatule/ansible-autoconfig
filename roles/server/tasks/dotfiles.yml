---
- name: Ensure the dotfiles home exists
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}"
  register: dotfiles_home_stat

- name: Fail when the dotfiles target user home is missing
  ansible.builtin.assert:
    that:
      - dotfiles_home_stat.stat.exists
      - dotfiles_home_stat.stat.isdir
    fail_msg: "The dotfiles target home {{ dotfiles_home }} does not exist."

- name: Ensure the dotfiles checkout parent exists
  ansible.builtin.file:
    path: "{{ dotfiles_repo_dir | dirname }}"
    state: directory
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
    mode: "0755"

# Clone the public dotfiles repo locally so Stow works from a normal package
# tree instead of trying to symlink files directly from a different project.
- name: Clone the public dotfiles repository
  ansible.builtin.git:
    repo: "{{ dotfiles_repo_url }}"
    dest: "{{ dotfiles_repo_dir }}"
    version: "{{ dotfiles_repo_version }}"
    force: true
  become: true
  become_user: "{{ dotfiles_user }}"

# Stow remains the symlink engine, while Ansible decides which packages are safe
# to apply on this host. The first slice defaults to the universal bash package.
- name: Stow the selected dotfiles packages
  ansible.builtin.command:
    argv:
      - stow
      - --restow
      - --target
      - "{{ dotfiles_home }}"
      - "{{ item }}"
  args:
    chdir: "{{ dotfiles_repo_dir }}"
  loop: "{{ dotfiles_stow_packages }}"
  become: true
  become_user: "{{ dotfiles_user }}"
  changed_when: false
