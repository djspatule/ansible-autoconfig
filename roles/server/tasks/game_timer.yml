---
- name: Ensure game-timer root directory exists
  ansible.builtin.file:
    path: "{{ game_timer_root_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy the vendored game-timer site tree
  ansible.builtin.copy:
    src: "{{ game_timer_source_dir }}"
    dest: "{{ game_timer_site_dir }}/"
    owner: root
    group: root
    mode: preserve
    directory_mode: "0755"

- name: Ensure the game-timer container network exists
  community.docker.docker_network:
    name: "{{ game_timer_network_name }}"
    state: present

# Serve the cloned repository directly because this app is already plain HTML,
# CSS, and JS with no build step.
- name: Run the game-timer container
  community.docker.docker_container:
    name: "{{ game_timer_container_name }}"
    image: "{{ game_timer_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports: "{{ game_timer_published_ports }}"
    networks:
      - name: "{{ game_timer_network_name }}"
    volumes:
      - "{{ game_timer_site_dir }}:/usr/share/nginx/html:ro"
