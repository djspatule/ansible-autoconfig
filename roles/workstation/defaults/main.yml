---
# NOTE: Opt-in per host, same pattern as base_dotfiles_enabled.
# Set workstation_enabled: true in host_vars/<hostname> to activate this role.
workstation_enabled: false
workstation_user: "{{ desktop_user | default('lion') }}"
workstation_home: "/home/{{ workstation_user }}"

# Sub-features are on by default once workstation_enabled is true, except
# espanso which requires an explicit opt-in (AUR build on Arch, see below).
workstation_cli_enabled: true
workstation_dotfiles_enabled: true
workstation_espanso_enabled: false

# Arch/Omarchy and Debian (trixie+) CLI/TUI tooling. Debian names differ where
# noted: github-cli -> gh, fd -> fd-find (binary is fdfind on Debian).
workstation_cli_packages_by_family:
  Archlinux:
    - fd
    - fzf
    - git
    - github-cli
    - jq
    - lazygit
    - neovim
    - tmux
    - unzip
    - wl-clipboard
    - yq
    - zip
    - zoxide
  Debian:
    - fd-find
    - fzf
    - git
    - gh
    - jq
    - lazygit
    - neovim
    - tmux
    - unzip
    - wl-clipboard
    - yq
    - zip
    - zoxide

# Espanso is not in the Arch official repos; the Wayland build lives in the AUR
# as espanso-wayland and is built with an AUR helper as the desktop user. The
# install is a one-time compile (guarded on the binary already existing), so it
# only pays the build cost on a fresh machine. An unattended build needs the
# desktop user to sudo without a prompt (the helper calls pacman); on a
# single-user Omarchy box that is the norm, otherwise run it once by hand.
workstation_aur_helper: yay
workstation_espanso_aur_package: espanso-wayland

# Systemd user services to enable after dotfiles are deployed. Override in
# host_vars to select which services are active on a given workstation.
workstation_systemd_user_services: []
