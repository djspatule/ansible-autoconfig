---
- name: Ensure the dotfiles home exists
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}"
  register: dotfiles_home_stat

- name: Ensure the repository-managed dotfiles tree exists
  ansible.builtin.stat:
    path: "{{ dotfiles_source_dir }}"
  register: dotfiles_source_dir_stat

- name: Fail when the dotfiles target user home is missing
  ansible.builtin.assert:
    that:
      - dotfiles_home_stat.stat.exists
      - dotfiles_home_stat.stat.isdir
      - dotfiles_source_dir_stat.stat.exists
      - dotfiles_source_dir_stat.stat.isdir
    fail_msg: >-
      The dotfiles home {{ dotfiles_home }} or the source tree
      {{ dotfiles_source_dir }} is missing.

# NOTE: The bash and starship tasks below are legacy per-file tasks kept for
# readable git history. The generic shell loop further down covers all newer
# packages (tmux, ssh, opencode, claude, nvim, git, gh, ...).
# TODO: these legacy tasks can be collapsed into the generic loop once the git
# history value is no longer needed.
- name: Check whether the existing bashrc is unmanaged
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.bashrc"
  register: dotfiles_bashrc_stat
  when: "'bash' in dotfiles_stow_packages"

- name: Resolve the existing bashrc symlink target
  ansible.builtin.command:
    argv:
      - readlink
      - -f
      - "{{ dotfiles_home }}/.bashrc"
  register: dotfiles_bashrc_link_target
  changed_when: false
  failed_when: false
  when:
    - "'bash' in dotfiles_stow_packages"
    - dotfiles_bashrc_stat.stat.islnk | default(false)

- name: Check whether a bashrc pre-stow backup already exists
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.bashrc.pre-stow-backup"
  register: dotfiles_bashrc_backup_stat
  when: "'bash' in dotfiles_stow_packages"

- name: Check whether the existing starship config is unmanaged
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.config/starship.toml"
  register: dotfiles_starship_stat
  when: "'starship' in dotfiles_stow_packages"

- name: Resolve the existing starship symlink target
  ansible.builtin.command:
    argv:
      - readlink
      - -f
      - "{{ dotfiles_home }}/.config/starship.toml"
  register: dotfiles_starship_link_target
  changed_when: false
  failed_when: false
  when:
    - "'starship' in dotfiles_stow_packages"
    - dotfiles_starship_stat.stat.islnk | default(false)

- name: Check whether a starship pre-stow backup already exists
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/.config/starship.toml.pre-stow-backup"
  register: dotfiles_starship_backup_stat
  when: "'starship' in dotfiles_stow_packages"

# Preserve the previous file once, then let Stow own the canonical path. This
# avoids silent data loss while still making the first Stow run deterministic.
- name: Back up the unmanaged bashrc before Stow takes over
  ansible.builtin.copy:
    src: "{{ dotfiles_home }}/.bashrc"
    dest: "{{ dotfiles_home }}/.bashrc.pre-stow-backup"
    remote_src: true
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
    mode: preserve
  when:
    - "'bash' in dotfiles_stow_packages"
    - dotfiles_bashrc_stat.stat.exists
    - not dotfiles_bashrc_stat.stat.islnk | default(false)
    - not dotfiles_bashrc_backup_stat.stat.exists

- name: Remove the unmanaged bashrc so Stow can create its symlink
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.bashrc"
    state: absent
  when:
    - "'bash' in dotfiles_stow_packages"
    - dotfiles_bashrc_stat.stat.exists
    - >-
      (not dotfiles_bashrc_stat.stat.islnk | default(false))
      or
      (dotfiles_bashrc_stat.stat.islnk | default(false)
       and dotfiles_bashrc_link_target.stdout != dotfiles_source_dir ~ '/bash/.bashrc')

# Treat Starship the same way as bash: preserve the previous config once, then
# let Stow own the canonical path from the managed dotfiles checkout.
- name: Back up the unmanaged starship config before Stow takes over
  ansible.builtin.copy:
    src: "{{ dotfiles_home }}/.config/starship.toml"
    dest: "{{ dotfiles_home }}/.config/starship.toml.pre-stow-backup"
    remote_src: true
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
    mode: preserve
  when:
    - "'starship' in dotfiles_stow_packages"
    - dotfiles_starship_stat.stat.exists
    - not dotfiles_starship_stat.stat.islnk | default(false)
    - not dotfiles_starship_backup_stat.stat.exists

- name: Remove the unmanaged starship config so Stow can create its symlink
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.config/starship.toml"
    state: absent
  when:
    - "'starship' in dotfiles_stow_packages"
    - dotfiles_starship_stat.stat.exists
    - >-
      (not dotfiles_starship_stat.stat.islnk | default(false))
      or
      (dotfiles_starship_stat.stat.islnk | default(false)
       and dotfiles_starship_link_target.stdout != dotfiles_source_dir ~ '/starship/.config/starship.toml')

# Stow refuses to create a symlink when a real file already exists. This loop:
#   1. Skips if the path doesn't exist (fresh machine — nothing to rescue).
#   2. Skips if the path is already our Stow symlink (idempotent re-runs).
#   3. Otherwise: saves a one-time backup as <path>.pre-stow-backup, then removes
#      the original so Stow can place its symlink. The backup is never overwritten.
# The bash/starship-specific tasks above are kept for readable git history;
# this generic loop covers newer packages such as tmux, ssh, opencode.
- name: Preserve unmanaged selected dotfiles before Stow takes over
  ansible.builtin.shell: |
    set -eu
    target='{{ dotfiles_home }}/{{ item.path }}'
    expected='{{ dotfiles_source_dir }}/{{ item.package }}/{{ item.path }}'
    backup="$target.pre-stow-backup"

    # CASE 1: nothing at the target -> Stow can create it freely.
    if [ ! -e "$target" ] && [ ! -L "$target" ]; then echo NOOP; exit 0; fi

    # CASE 2: target is already our Stow symlink (a whole-dir fold, legacy state).
    if [ -L "$target" ] && [ "$(readlink -f "$target")" = "$expected" ]; then
      echo NOOP; exit 0
    fi

    # CASE 3: with --no-folding a managed directory is a REAL dir whose entries
    # are symlinks into the package source. If we find such a symlink, the path is
    # already managed -> leave it alone (otherwise we would wipe it every run).
    if [ -d "$target" ] && [ ! -L "$target" ]; then
      link=$(find "$target" -type l 2>/dev/null | head -n1)
      if [ -n "$link" ]; then
        case "$(readlink -f "$link")" in
          "$expected"/*) echo NOOP; exit 0 ;;
        esac
      fi
    fi

    # CASE 4: an unmanaged file/dir is in the way: back it up once, then remove it
    # so Stow can place its links. Emit CHANGED so Ansible reports this honestly.
    if [ ! -e "$backup" ] && [ ! -L "$backup" ]; then
      cp -a "$target" "$backup"
      chown -h '{{ dotfiles_user }}:{{ dotfiles_user }}' "$backup"
    fi
    rm -rf "$target"
    echo CHANGED
  args:
    executable: /bin/bash
  loop: "{{ dotfiles_managed_paths | selectattr('package', 'in', dotfiles_stow_packages) | list }}"
  # Per loop item, the item's own stdout is available here, so this flags changed
  # only when the script actually backed up/removed something.
  changed_when: "'CHANGED' in preserve_dotfiles.stdout"
  register: preserve_dotfiles
  when:
    - item.package not in ['bash', 'starship']

# Stow remains the symlink engine, while Ansible decides which packages are safe
# to apply on this host.
#
# --no-folding is important: without it, Stow "folds" a whole package directory
# into a single directory symlink when the target dir does not pre-exist (e.g.
# ~/.config/gh -> repo/.../gh/.config/gh). That is dangerous here because the
# repo lives in the managed pull checkout: an app writing runtime state into that
# dir (gh writing hosts.yml with its OAuth token, nvim writing lazy state) would
# write straight into the git working tree. --no-folding keeps every directory a
# real local dir and symlinks only the individual managed files.
- name: Stow the selected dotfiles packages
  ansible.builtin.command:
    argv:
      - stow
      - --no-folding
      - --restow
      - --target
      - "{{ dotfiles_home }}"
      - "{{ item }}"
  args:
    chdir: "{{ dotfiles_source_dir }}"
  loop: "{{ dotfiles_stow_packages }}"
  become: true
  become_user: "{{ dotfiles_user }}"
  # --restow rebuilds the links every run, which also repairs any older folded
  # install and drops links for files removed from a package. That means stow
  # always "acts", but the net end state is stable/idempotent, so we report
  # unchanged rather than flag churn on every pull.
  changed_when: false

# Secret dotfiles are stored vault-encrypted in the repo. Stow cannot manage them
# (a symlink would hand the application ciphertext), so they are copied into place
# instead. The copy module decrypts a vaulted source automatically as long as the
# vault password is available (--vault-password-file or ansible.cfg).
- name: Ensure parent directories for secret dotfiles exist
  ansible.builtin.file:
    path: "{{ (dotfiles_home ~ '/' ~ item.dest) | dirname }}"
    state: directory
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
    mode: "{{ item.dir_mode | default('0700') }}"
  loop: "{{ dotfiles_secret_files | default([]) }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Deploy vault-encrypted dotfiles (decrypted into place)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ dotfiles_home }}/{{ item.dest }}"
    owner: "{{ dotfiles_user }}"
    group: "{{ dotfiles_user }}"
    mode: "{{ item.mode | default('0600') }}"
  loop: "{{ dotfiles_secret_files | default([]) }}"
  loop_control:
    label: "{{ item.dest }}"
  no_log: true
