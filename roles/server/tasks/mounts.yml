---
- name: Require a versioned fstab source when fstab management is enabled
  ansible.builtin.assert:
    that:
      - server_fstab_src | length > 0
    fail_msg: server_manage_fstab is enabled but server_fstab_src is empty.

# Keep the OS installer in charge of root, boot, EFI and swap entries. Ansible
# owns only this clearly marked data-mount block, so repeated pulls can update
# the desired data disks without replacing the whole system fstab.
- name: Install the managed data mount block in fstab
  ansible.builtin.blockinfile:
    path: /etc/fstab
    marker: "# {mark} ANSIBLE MANAGED SERVER DATA MOUNTS"
    block: "{{ lookup('ansible.builtin.file', server_fstab_src) }}"
    owner: root
    group: root
    mode: "0644"
    backup: true

# Parse the versioned data-mount source instead of maintaining a second mount
# point list in vars. Lines that are blank or commented out are ignored.
- name: Read mount points from the managed fstab source
  ansible.builtin.shell: |
    awk '!/^[[:space:]]*#/ && NF >= 2 && $2 ~ /^\// && $2 != "/" { print $2 }' "{{ server_fstab_src }}"
  args:
    executable: /bin/bash
  register: server_fstab_mount_points
  changed_when: false

# Mount points must exist before mount -a can apply the managed entries. The
# loop runs the file module once per path extracted from the fstab source.
- name: Ensure mount points from fstab exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ server_fstab_mount_points.stdout_lines }}"

# Apply the current fstab after the managed block and its target directories are
# in place. The data entries use nofail, so missing disks do not block VM tests.
- name: Mount filesystems declared in fstab
  ansible.builtin.command: mount -a
  changed_when: false
