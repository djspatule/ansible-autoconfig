---
- name: Ensure Pi-hole root-managed directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ pihole_root_dir }}"

- name: Ensure Pi-hole secret directory exists
  ansible.builtin.file:
    path: "{{ pihole_secret_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

# Pi-hole updates files under /etc/pihole itself, so Ansible should avoid
# resetting ownership there on every run.
- name: Ensure Pi-hole runtime configuration directory exists
  ansible.builtin.file:
    path: "{{ pihole_config_dir }}"
    state: directory
    mode: "0755"

- name: Ensure Pi-hole hosts directory exists
  ansible.builtin.file:
    path: "{{ pihole_config_dir }}/hosts"
    state: directory
    mode: "0755"

- name: Check whether Pi-hole web password file exists
  ansible.builtin.stat:
    path: "{{ pihole_web_password_file }}"
  register: pihole_web_password_file_stat
  no_log: true

- name: Generate Pi-hole web password on the target host
  ansible.builtin.shell: "tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32"
  register: pihole_web_password_generated
  changed_when: true
  when: not pihole_web_password_file_stat.stat.exists
  no_log: true

- name: Save generated Pi-hole web password
  ansible.builtin.copy:
    content: "{{ pihole_web_password_generated.stdout }}\n"
    dest: "{{ pihole_web_password_file }}"
    owner: root
    group: root
    mode: "0600"
  when: not pihole_web_password_file_stat.stat.exists
  no_log: true

- name: Read Pi-hole web password from the managed secret file
  ansible.builtin.slurp:
    src: "{{ pihole_web_password_file }}"
  register: pihole_web_password_slurp
  no_log: true

- name: Load Pi-hole web password
  ansible.builtin.set_fact:
    pihole_web_password: "{{ pihole_web_password_slurp.content | b64decode | trim }}"
  no_log: true

- name: Ensure Pi-hole container network exists
  community.docker.docker_network:
    name: "{{ pihole_network_name }}"
    state: present

- name: Check whether the extracted Pi-hole adlist file exists
  ansible.builtin.stat:
    path: "{{ pihole_adlists_file }}"
  register: pihole_adlists_file_stat
  when: pihole_policy_import_enabled

- name: Check whether the extracted Pi-hole exact allowlist file exists
  ansible.builtin.stat:
    path: "{{ pihole_allowlist_exact_file }}"
  register: pihole_allowlist_file_stat
  when: pihole_policy_import_enabled

- name: Require extracted Pi-hole policy files when import is enabled
  ansible.builtin.assert:
    that:
      - pihole_adlists_file_stat.stat.exists
      - pihole_allowlist_file_stat.stat.exists
    fail_msg: Pi-hole policy import is enabled but the extracted backup files are missing.
  when: pihole_policy_import_enabled

# Keep the DNS service on the host, but let the admin UI stay private behind the
# reverse proxy so websites and Pi-hole do not compete for extra host web ports.
- name: Pull Pi-hole image
  community.docker.docker_image:
    name: "{{ pihole_image }}"
    source: pull

- name: Run Pi-hole container
  community.docker.docker_container:
    name: "{{ pihole_container_name }}"
    image: "{{ pihole_image }}"
    state: started
    restart_policy: unless-stopped
    published_ports: "{{ pihole_published_ports }}"
    networks:
      - name: "{{ pihole_network_name }}"
    volumes:
      - "{{ pihole_config_dir }}:/etc/pihole"
    capabilities: "{{ pihole_capabilities }}"
    env:
      TZ: "{{ pihole_timezone }}"
      FTLCONF_webserver_api_password: "{{ pihole_web_password }}"
      FTLCONF_dns_listeningMode: "{{ pihole_dns_listening_mode }}"
      FTLCONF_dns_upstreams: "{{ pihole_dns_upstreams | join(';') }}"
      FTLCONF_dns_domain: "{{ pihole_dns_domain }}"
      FTLCONF_dns_piholePTR: "{{ pihole_dns_ptr_mode }}"
      FTLCONF_dns_domainNeeded: "{{ pihole_dns_domain_needed | ternary('true', 'false') }}"
      FTLCONF_dns_expandHosts: "{{ pihole_dns_expand_hosts | ternary('true', 'false') }}"
      FTLCONF_dns_bogusPriv: "{{ pihole_dns_bogus_priv | ternary('true', 'false') }}"
      FTLCONF_dns_queryLogging: "{{ pihole_dns_query_logging | ternary('true', 'false') }}"
      FTLCONF_dns_EDNS0ECS: "{{ pihole_dns_edns0_ecs | ternary('true', 'false') }}"
  no_log: true

- name: Wait for Pi-hole gravity.db to be present
  ansible.builtin.stat:
    path: "{{ pihole_config_dir }}/gravity.db"
  register: pihole_gravity_db_stat
  retries: 30
  delay: 2
  until: pihole_gravity_db_stat.stat.exists
  when: pihole_policy_import_enabled

- name: Prepare SQL-safe Pi-hole import comment
  ansible.builtin.set_fact:
    pihole_import_comment_sql: >-
      {{ pihole_import_comment | replace("'", "''") }}
  when: pihole_policy_import_enabled

# The imported entries are tagged with a dedicated comment so future runs can
# update or prune only the Ansible-managed subset without disturbing manual UI
# changes the family may add later.
- name: Import Pi-hole adlists from the extracted backup
  ansible.builtin.shell: |
    set -eu
    db="{{ pihole_config_dir }}/gravity.db"
    file="{{ pihole_adlists_file }}"
    marker="{{ pihole_import_comment_sql }}"
    changes=0
    while IFS= read -r address; do
      [ -n "$address" ] || continue
      esc_address=${address//\'/\'\'}
      delta=$(sqlite3 "$db" "INSERT INTO adlist(address, enabled, comment) VALUES('$esc_address', 1, '$marker') ON CONFLICT(address, type) DO UPDATE SET enabled=1, comment='$marker' WHERE enabled != 1 OR IFNULL(comment, '') != '$marker'; SELECT changes();")
      changes=$((changes + delta))
    done < "$file"
    while IFS='|' read -r id address; do
      [ -n "$id" ] || continue
      if ! grep -Fxq "$address" "$file"; then
        delta=$(sqlite3 "$db" "DELETE FROM adlist WHERE id=$id; SELECT changes();")
        changes=$((changes + delta))
      fi
    done < <(sqlite3 -separator '|' "$db" "SELECT id, address FROM adlist WHERE comment='$marker';")
    printf '%s\n' "$changes"
  args:
    executable: /bin/bash
  register: pihole_adlist_import
  changed_when: (pihole_adlist_import.stdout | trim | int) > 0
  when: pihole_policy_import_enabled

- name: Import Pi-hole exact allowlist from the extracted backup
  ansible.builtin.shell: |
    set -eu
    db="{{ pihole_config_dir }}/gravity.db"
    file="{{ pihole_allowlist_exact_file }}"
    marker="{{ pihole_import_comment_sql }}"
    changes=0
    while IFS= read -r domain; do
      [ -n "$domain" ] || continue
      esc_domain=${domain//\'/\'\'}
      delta=$(sqlite3 "$db" "INSERT INTO domainlist(type, domain, enabled, comment) VALUES(0, '$esc_domain', 1, '$marker') ON CONFLICT(domain, type) DO UPDATE SET enabled=1, comment='$marker' WHERE enabled != 1 OR IFNULL(comment, '') != '$marker'; SELECT changes();")
      changes=$((changes + delta))
    done < "$file"
    while IFS='|' read -r id domain; do
      [ -n "$id" ] || continue
      if ! grep -Fxq "$domain" "$file"; then
        delta=$(sqlite3 "$db" "DELETE FROM domainlist WHERE id=$id; SELECT changes();")
        changes=$((changes + delta))
      fi
    done < <(sqlite3 -separator '|' "$db" "SELECT id, domain FROM domainlist WHERE type=0 AND comment='$marker';")
    printf '%s\n' "$changes"
  args:
    executable: /bin/bash
  register: pihole_allowlist_import
  changed_when: (pihole_allowlist_import.stdout | trim | int) > 0
  when: pihole_policy_import_enabled

- name: Restart Pi-hole after policy import changes
  ansible.builtin.command:
    argv:
      - docker
      - restart
      - "{{ pihole_container_name }}"
  changed_when: true
  when:
    - pihole_policy_import_enabled
    - pihole_adlist_import.changed or pihole_allowlist_import.changed
