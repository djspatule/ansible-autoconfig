---
# Keep the server task list explicit and flat so each service can be tested with
# tags and understood without chasing too much indirection.
- import_tasks: docker.yml
  tags:
    - server
    - server_docker

- import_tasks: mounts.yml
  when: server_storage_mounts | length > 0
  tags:
    - server
    - server_mounts

- import_tasks: homepage.yml
  when: server_homepage_enabled | default(false)
  tags:
    - server
    - homepage

- import_tasks: bentopdf.yml
  when: server_bentopdf_enabled | default(false)
  tags:
    - server
    - bentopdf

- import_tasks: game_timer.yml
  when: server_game_timer_enabled | default(false)
  tags:
    - server
    - game_timer

- import_tasks: nextcloud.yml
  when: server_nextcloud_enabled | default(false)
  tags:
    - server
    - nextcloud

- import_tasks: pihole.yml
  when: server_pihole_enabled | default(false)
  tags:
    - server
    - pihole

- import_tasks: aumenuilya.yml
  when: server_aumenuilya_enabled | default(false)
  tags:
    - server
    - aumenuilya

- import_tasks: reverse_proxy.yml
  when: server_reverse_proxy_enabled | default(false)
  tags:
    - server
    - reverse_proxy
