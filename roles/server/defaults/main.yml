---
# Keep server package names in one map so the role can stay portable across
# Debian-family and Arch-family hosts without branching the whole role.
server_packages_by_family:
  Debian:
    cli:
      - curl
      - btop
      - python3-psutil
      - micro
      - fastfetch
      - pdfgrep
      - ncdu
      - mc
      - bat
      - clamav
      - rclone
      - cmatrix
      - eza
      - sl
      - stow
      - snapd
      - tree
      - ripgrep
      - rsync
    docker:
      - docker.io
      - python3-docker
    snaps:
      - tldr
  Archlinux:
    cli:
      - curl
      - btop
      - python-psutil
      - micro
      - fastfetch
      - pdfgrep
      - ncdu
      - mc
      - bat
      - clamav
      - rclone
      - cmatrix
      - eza
      - sl
      - stow
      - tree
      - ripgrep
      - tldr
      - rsync
    docker:
      - docker
      - python-docker
    snaps: []

server_homepage_enabled: false
homepage_container_name: homepage
homepage_image: ghcr.io/gethomepage/homepage:latest
homepage_root_dir: /opt/homepage
homepage_config_dir: /opt/homepage/config
homepage_source_dir: "{{ role_path }}/../../files/homepage/opt/homepage/"
homepage_network_name: autoconfig-services
homepage_port: 3000
homepage_allowed_hosts:
  - "{{ inventory_hostname }}:{{ homepage_port }}"
  - "{{ ansible_facts.hostname }}:{{ homepage_port }}"
homepage_extra_allowed_hosts: []

server_bentopdf_enabled: false
bentopdf_container_name: bentopdf
bentopdf_image: ghcr.io/alam00000/bentopdf-simple:latest
bentopdf_network_name: autoconfig-services
bentopdf_port: 8080

server_game_timer_enabled: false
# game-timer is a plain static site, so cloning the repo and serving it from a
# tiny web container is simpler than inventing a build pipeline it does not need.
game_timer_repo_url: https://github.com/djspatule/game-timer.git
game_timer_repo_version: main
game_timer_root_dir: /opt/game-timer
game_timer_repo_dir: "{{ game_timer_root_dir }}/site"
game_timer_container_name: game-timer
game_timer_image: nginx:alpine
game_timer_network_name: autoconfig-services
game_timer_published_ports: []

server_nextcloud_enabled: false
# Nextcloud keeps both app state and user files on persistent storage. The real
# server uses SSD_1TO so the service does not silently fall back to the root LV.
nextcloud_network_name: autoconfig-services
nextcloud_root_dir: /mnt/SSD_1TO/nextcloud
nextcloud_app_dir: "{{ nextcloud_root_dir }}/app"
nextcloud_db_data_dir: "{{ nextcloud_root_dir }}/db"
nextcloud_data_dir: "{{ nextcloud_root_dir }}/data"
nextcloud_secret_dir: /etc/ansible/secrets
nextcloud_db_container_name: nextcloud-db
nextcloud_db_image: mariadb:11
nextcloud_container_name: nextcloud
nextcloud_image: nextcloud:latest
nextcloud_db_name: nextcloud
nextcloud_db_user: nextclouduser
nextcloud_db_password_file: "{{ nextcloud_secret_dir }}/nextcloud-db-password"
nextcloud_db_root_password_file: "{{ nextcloud_secret_dir }}/nextcloud-db-root-password"
nextcloud_admin_user: lion
nextcloud_admin_password_file: "{{ nextcloud_secret_dir }}/nextcloud-admin-password"
nextcloud_published_ports: []
nextcloud_public_url: https://cloud.dinnizer.com
nextcloud_trusted_domains:
  - cloud.dinnizer.com
nextcloud_trusted_proxies:
  - server-reverse-proxy
nextcloud_wait_retries: 30
nextcloud_wait_delay: 5

# Host vars can override this with the real disk layout. Keeping a default empty
# list makes the mount task safe on hosts that do not need extra storage.
server_storage_mounts: []

server_dotfiles_enabled: false
# Keep the first Stow slice intentionally small and low-risk: public repo clone,
# user-scoped checkout, and only packages explicitly listed per host.
dotfiles_repo_url: https://github.com/djspatule/omarchy-dotfiles.git
dotfiles_repo_version: main
dotfiles_user: "{{ desktop_user | default('lion') }}"
dotfiles_home: "/home/{{ dotfiles_user }}"
dotfiles_repo_dir: "{{ dotfiles_home }}/.local/share/omarchy-dotfiles"
dotfiles_stow_packages:
  - bash
# Adopt lets Stow take over an existing dotfile on the first run instead of
# aborting because the file predates Stow management.
dotfiles_stow_adopt_existing: true

server_pihole_enabled: false
# Pi-hole stays on the same shared Docker network so the reverse proxy can front
# the admin UI without exposing another host HTTP port.
pihole_container_name: pihole
# Pin the image so daily ansible-pull runs do not silently jump to a newer
# Pi-hole release without an explicit code change.
pihole_image: pihole/pihole:2026.04.0
pihole_network_name: autoconfig-services
pihole_root_dir: /opt/pihole
pihole_config_dir: "{{ pihole_root_dir }}/etc-pihole"
pihole_secret_dir: /etc/ansible/secrets
pihole_web_password_file: "{{ pihole_secret_dir }}/pihole-web-password"
pihole_timezone: Europe/Paris
pihole_dns_listening_mode: ALL
pihole_dns_upstreams:
  - 1.1.1.1
  - 1.0.0.1
# Real hosts will normally bind 53 directly. The VM overrides this to a high
# port so the feedback loop does not fight the host resolver.
pihole_published_ports:
  - "53:53/tcp"
  - "53:53/udp"
# NET_ADMIN is kept explicit because Pi-hole documents it as the practical
# default for containerized network operations, even when DHCP stays off.
pihole_capabilities:
  - NET_ADMIN

server_reverse_proxy_enabled: false
# Caddy keeps the reverse proxy readable enough to use as a learning tool.
server_reverse_proxy_container_name: server-reverse-proxy
server_reverse_proxy_image: caddy:2.10-alpine
server_reverse_proxy_root_dir: /opt/reverse-proxy
server_reverse_proxy_config_dir: "{{ server_reverse_proxy_root_dir }}/caddy"
server_reverse_proxy_data_dir: "{{ server_reverse_proxy_root_dir }}/data"
server_reverse_proxy_network_name: autoconfig-services
server_reverse_proxy_auto_https: false
server_reverse_proxy_published_ports:
  - "80:80"
# Each site can either proxy to an upstream or redirect to a canonical host.
server_reverse_proxy_sites: []

server_aumenuilya_enabled: false
aumenuilya_network_name: autoconfig-services
aumenuilya_root_dir: /opt/aumenuilya
aumenuilya_app_dir: "{{ aumenuilya_root_dir }}/wordpress"
aumenuilya_db_data_dir: "{{ aumenuilya_root_dir }}/mariadb"
aumenuilya_import_dir: "{{ aumenuilya_root_dir }}/import"
aumenuilya_secret_dir: /etc/ansible/secrets
aumenuilya_db_container_name: aumenuilya-db
aumenuilya_app_container_name: aumenuilya
aumenuilya_db_image: mariadb:11.4
# This backup comes from a 2022 WordPress install with legacy theme code.
# Pinning an older WordPress/PHP image is more realistic than pretending that
# unmaintained theme code will run cleanly on the newest PHP release.
aumenuilya_wordpress_image: wordpress:5.9.3-php7.4-apache
aumenuilya_wpcli_image: wordpress:cli-php7.4
aumenuilya_db_name: aumenuilkomyriam
aumenuilya_db_user: aumenuilkomyriam
aumenuilya_db_password_file: "{{ aumenuilya_secret_dir }}/aumenuilya-db-password"
aumenuilya_db_root_password_file: "{{ aumenuilya_secret_dir }}/aumenuilya-db-root-password"
aumenuilya_table_prefix: wp_
aumenuilya_old_url: http://www.aumenuilya.com
aumenuilya_public_url: http://aumenuilya.localtest.me:8081
aumenuilya_backup_root: ""
aumenuilya_source_tree: "{{ aumenuilya_backup_root }}/www_old"
aumenuilya_source_wp_content: "{{ aumenuilya_source_tree }}/wp-content/"
aumenuilya_source_htaccess: "{{ aumenuilya_source_tree }}/.htaccess"
aumenuilya_source_ads_txt: "{{ aumenuilya_backup_root }}/ads.txt"
aumenuilya_source_sql_dump: "{{ aumenuilya_backup_root }}/aumenuilkomyriam_mysql_db_NoComments_20220515.sql"
aumenuilya_published_ports: []
aumenuilya_wait_retries: 30
aumenuilya_wait_delay: 5

autoconfig_repo_url: https://github.com/djspatule/ansible-autoconfig.git
autoconfig_branch: main
autoconfig_repo_dir: /opt/ansible-pull
autoconfig_playbook: local.yml
autoconfig_timer_name: autoconfig-pull
autoconfig_on_calendar: daily
autoconfig_randomized_delay: 30m
autoconfig_persistent: true
autoconfig_vault_password_file: ""
