---
# Play order: pre_tasks (package cache) → base (all hosts) → server → workstation → cleanup.
# Run a subset with tags:  ansible-playbook local.yml --tags base
#                          ansible-playbook local.yml --tags server,pihole
#                          ansible-playbook local.yml --tags dotfiles --skip-tags always
# Limit to one host:       ansible-playbook local.yml --limit serverannah
- hosts: all
  tags: always
  become: true
  pre_tasks:
    - name: update repositories (arch)
      tags: always
      become: true
      community.general.pacman:
        update_cache: true
      changed_when: false
      when: ansible_facts['distribution'] == 'Archlinux'

    - name: update repositories and apply distribution upgrades
      tags: always
      become: true
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      # No changed_when override here: a dist upgrade is a real system change, so
      # let Ansible report "changed" honestly when packages were actually upgraded.
      # os_family covers every Debian-derivative (Debian, Ubuntu, Pop!_OS, Linux
      # Mint, …) so apt tasks no longer silently skip on a distro we forgot to list.
      when: ansible_facts['os_family'] == "Debian"

# run roles
- hosts: all
  tags: base
  become: true
  roles:
    - base

- hosts: server
  tags: server
  become: true
  roles:
    # The server role now contains only server-specific storage and services.
    - server

- hosts: workstation
  tags: workstation
  become: true
  roles:
    - workstation

- hosts: kids
  tags: kids
  become: true
  roles:
    - kids

# end of run cleanup
- hosts: all
  become: true
  tasks:
    - name: cleanup package cache (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoclean: true
      changed_when: false
      # os_family covers every Debian-derivative (Debian, Ubuntu, Pop!_OS, Linux
      # Mint, …) so apt tasks no longer silently skip on a distro we forgot to list.
      when: ansible_facts['os_family'] == "Debian"

    - name: autoremove orphan packages (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoremove: true
        purge: true
      # os_family covers every Debian-derivative (Debian, Ubuntu, Pop!_OS, Linux
      # Mint, …) so apt tasks no longer silently skip on a distro we forgot to list.
      when: ansible_facts['os_family'] == "Debian"
