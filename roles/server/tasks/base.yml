---
- name: Ensure the server role runs on supported hosts
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family in server_packages_by_family
    fail_msg: >-
      server currently supports only these OS families:
      {{ server_packages_by_family.keys() | join(', ') }}.

- name: Load package plan for this OS family
  ansible.builtin.set_fact:
    server_cli_packages: "{{ server_packages_by_family[ansible_facts.os_family].cli }}"
    server_docker_packages: "{{ server_packages_by_family[ansible_facts.os_family].docker }}"
    server_snap_packages: "{{ server_packages_by_family[ansible_facts.os_family].snaps }}"

# Refreshing package metadata helps first-run installs, but it should not look
# like configuration drift in daily idempotency runs.
- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  changed_when: false
  when: ansible_facts.os_family == "Debian"

- name: Refresh pacman cache
  community.general.pacman:
    update_cache: true
  changed_when: false
  when: ansible_facts.os_family == "Archlinux"

- name: Install base CLI packages for servers
  ansible.builtin.package:
    name: "{{ server_cli_packages }}"
    state: present

- name: Ensure snapd is enabled and running
  ansible.builtin.service:
    name: snapd
    state: started
    enabled: true
  when: server_snap_packages | length > 0

- name: Install CLI snap packages
  community.general.snap:
    name: "{{ item }}"
    state: present
  loop: "{{ server_snap_packages }}"
  when: server_snap_packages | length > 0

# Docker comes from the distro here on purpose: fewer moving parts while the
# server foundation is still being proven across different machines.
- name: Install Docker from distro packages
  ansible.builtin.package:
    name: "{{ server_docker_packages }}"
    state: present

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
